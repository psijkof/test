services:
  econocombpc-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  seq:
    image: "docker.io/datalust/seq:2025.2"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:80"
    volumes:
      - type: "volume"
        target: "/data"
        source: "apphost-feed4158f1-seq-data"
        read_only: false
    networks:
      - "aspire"
  mailpit:
    image: "docker.io/axllent/mailpit:v1.22.3"
    environment:
      MP_DATABASE: "/data/mailpit.db"
    ports:
      - "8025"
    expose:
      - "1025"
    volumes:
      - type: "volume"
        target: "/data"
        source: "maildata"
        read_only: false
    networks:
      - "aspire"
  sqlserver:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${ADMIN_PASSWORD}"
    expose:
      - "1433"
    networks:
      - "aspire"
  WebApp:
    image: "${WEBAPP_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${WEBAPP_PORT}"
      ConnectionStrings__EcoBpc: "Server=sqlserver,1433;User ID=sa;Password=${ADMIN_PASSWORD};TrustServerCertificate=true;Initial Catalog=EcoBpc"
      ECOBPC_HOST: "sqlserver"
      ECOBPC_PORT: "1433"
      ECOBPC_USERNAME: "sa"
      ECOBPC_PASSWORD: "${ADMIN_PASSWORD}"
      ECOBPC_URI: "mssql://sa:${ADMIN_PASSWORD}@sqlserver:1433/EcoBpc"
      ECOBPC_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sqlserver:1433;trustServerCertificate=true;databaseName=EcoBpc"
      ECOBPC_DATABASENAME: "EcoBpc"
      ConnectionStrings__seq: "http://seq:80"
      SEQ_HOST: "seq"
      SEQ_PORT: "80"
      SEQ_URI: "http://seq:80"
      ConnectionStrings__mailpit: "Endpoint=smtp://mailpit:1025"
      MAILPIT_HOST: "mailpit"
      MAILPIT_PORT: "1025"
      MAILPIT_URI: "smtp://mailpit:1025"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://econocomBPC-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "WebApp"
    ports:
      - "${WEBAPP_PORT}"
    depends_on:
      sqlserver:
        condition: "service_started"
      seq:
        condition: "service_started"
      mailpit:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  apphost-feed4158f1-seq-data:
    driver: "local"
  maildata:
    driver: "local"
